data:
  data_path: data/sample_data/financial_news_sample.csv
  text_col: text
  label_col: label
  date_col: published_at
  ticker_col: ticker
  test_size: 0.1
  val_size: 0.1
  random_state: 42

model:
  model_name: distilbert-base-uncased
  max_length: 256
  learning_rate: 0.00002
  batch_size: 8
  epochs: 2
  weight_decay: 0.01
  output_dir: models/financial-news-transformer
